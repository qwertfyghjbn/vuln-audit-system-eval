id: "SSRF-JA-REPO-001"
title: "SSRF via three-layer controllerâ†’serviceâ†’util chain (Java)"
description: |
  A Spring Boot application with controller/service/util layering. The
  /api/proxy/fetch endpoint reads a URL from @RequestParam in the controller
  layer, passes it through ProxyService.fetchRemote() in the service layer,
  and ultimately calls HttpUtil.getUrl() in the util layer which passes the
  URL directly to RestTemplate.getForObject() without any scheme, host, or
  IP-range validation. The taint flows across three files before reaching
  the sink, requiring cross-file inter-procedural analysis.

