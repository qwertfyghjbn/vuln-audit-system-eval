id: "SSTI-JA-REPO-002"
title: "SSTI prevented by static Freemarker template in util + allowlist in service (near-miss)"
description: |
  A Spring Boot application with the same controller/service/util structure as
  SSTI-JA-REPO-001. The controller layer is nearly identical. However, the
  service layer validates the title via a regex allowlist in validateTitle()
  before passing it to util, and the util layer uses a static template constant
  REPORT_TEMPLATE with a ${title} placeholder — user input is passed only as a
  model variable to template.process(), never concatenated into the template
  source. A system that flags new Template() due to user-data reachability
  without tracing the source-vs-model distinction will produce a false positive.

