id: "SSRF-JA-FILE-002"
title: "SSRF guard via isSafeUrl helper and no-redirect RestTemplate (near-miss)"
description: |
  A Spring Boot REST controller with the same surface pattern as
  SSRF-JA-FILE-001: @RequestParam url flows into RestTemplate.getForObject().
  A private helper isSafeUrl() enforces scheme allowlist, domain allowlist,
  and IP-range blocking (loopback/site-local/link-local). A custom
  RestTemplate factory disables redirect following. A system that does not
  trace into isSafeUrl() will incorrectly flag getForObject() as a
  vulnerable sink.

