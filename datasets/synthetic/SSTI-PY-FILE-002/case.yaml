id: "SSTI-PY-FILE-002"
title: "SSTI prevented by static template + allowlist validator (near-miss)"
description: |
  A Flask route that appears risky: user input is accepted and passed to
  render_template_string(). However, the template string is a static
  constant with a {{ name }} placeholder (never concatenated), and user
  input is validated through a strict regex allowlist before being passed
  as a context variable. A system that flags render_template_string() on
  the presence of user-controlled data without tracing the sanitization
  step will produce a false positive.

