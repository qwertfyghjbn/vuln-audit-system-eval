id: "SSTI-PY-REPO-002"
title: "SSTI prevented by static template in utils + allowlist in service (near-miss)"
description: |
  A Flask application with the same route/service/utils structure as
  SSTI-PY-REPO-001. The route layer is nearly identical. However, the service
  layer validates the title via a regex allowlist in _validate_title() before
  passing it to utils, and the utils layer uses a static template constant
  _REPORT_TEMPLATE with a {{ title }} placeholder — user input is passed only
  as a context variable to render(), never concatenated into the template
  source. A system that flags from_string() due to user-data reachability
  without tracing the source-vs-context distinction will produce a false
  positive.

