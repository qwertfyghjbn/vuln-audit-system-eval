id: "PT-JA-FILE-002"
title: "Path traversal guard via resolveSafePath helper (near-miss)"
description: |
  A Spring Boot REST controller with the same surface pattern as PT-JA-FILE-001:
  a @RequestParam filename is resolved via Paths.get and read with
  Files.readAllBytes. However, a private helper resolveSafePath() applies
  normalize(), toRealPath() for symlink resolution, and a strict startsWith()
  prefix check before returning the path. A system that does not trace into
  resolveSafePath() will incorrectly flag Files.readAllBytes() as a
  vulnerable sink.

