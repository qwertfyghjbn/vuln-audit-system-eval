id: "SSTI-JA-FILE-002"
title: "SSTI prevented by static Freemarker template + allowlist validator (near-miss)"
description: |
  A Spring Boot REST controller that appears risky: user input is accepted
  and a Freemarker Template object is constructed, followed by template.process().
  However, the template source is a static constant GREETING_TEMPLATE with a
  ${name} placeholder; user input is passed only as a model variable, never
  concatenated into the template source. sanitizeName() further validates
  the input against a strict regex allowlist. A system that flags
  template.process() due to user-data reachability without distinguishing
  template-source injection from model-variable injection will produce a
  false positive.

