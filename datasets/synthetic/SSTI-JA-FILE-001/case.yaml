id: "SSTI-JA-FILE-001"
title: "SSTI via string concatenation into Freemarker Template constructor"
description: |
  A Spring Boot REST controller concatenates a user-supplied name directly
  into a Freemarker template source string, then constructs a Template object
  from it via new Template(..., new StringReader(templateStr), cfg). The
  Freemarker engine parses and evaluates the full string, including any
  FreeMarker directives or expressions the attacker embeds.

