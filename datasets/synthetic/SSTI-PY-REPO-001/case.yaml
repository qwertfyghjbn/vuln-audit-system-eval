description: |
  A Flask application with route/service/utils layering. The
  /api/reports/preview endpoint reads a title from request.args in the route
  layer, passes it through ReportService.render_preview() in the service
  layer, and ultimately calls render_report_template() in the utils layer
  which concatenates the title directly into a Jinja2 template source string
  before calling Environment.from_string(). The taint flows across three files
  before reaching the sink, requiring cross-file inter-procedural analysis.

