id: "PT-PY-REPO-002"
title: "Path traversal guard in service layer, utils layer is unguarded (near-miss)"
description: |
  A Flask application with the same route/service/utils structure as
  PT-PY-REPO-001. The route layer is identical to REPO-001. The utils layer
  also exposes a bare file-open sink, but with different parameter semantics:
  read_file() accepts a pre-validated absolute path from the service layer
  rather than a raw user-supplied filename — it calls open(path) directly
  with no path check. FileService._resolve_safe_path() in the service layer
  validates and canonicalizes the filename before read_file() is called.
  A system that analyzes utils/file_utils.py in isolation, or loses track of
  taint at the service→utils boundary, will produce a false positive.

