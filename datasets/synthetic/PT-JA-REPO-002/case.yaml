id: "PT-JA-REPO-002"
title: "Path traversal guard in service layer, util layer is unguarded (near-miss)"
description: |
  A Spring Boot application with the same controller/service/util structure
  as PT-JA-REPO-001. The controller layer is identical. FileService contains
  a private resolveSafePath() method that applies normalize(), a pre-symlink
  prefix check, toRealPath(), and a post-symlink startsWith() check before
  passing a canonical Path to FileUtil.readFile(). FileUtil.readFile() accepts
  a Path directly and calls Files.readAllBytes() with no path check — it looks
  vulnerable in isolation. A system that analyzes FileUtil in isolation, or
  loses track of the taint at the service→util boundary, will produce a false
  positive.

