id: "PT-JA-FILE-001"
title: "Path traversal in Spring Boot file download endpoint"
description: |
  A Spring Boot REST controller reads a filename from a query parameter
  and constructs the file path via Paths.get(BASE_DIR, filename) without
  normalization or prefix restriction. Paths.get() does not canonicalize
  '..' segments, allowing an attacker to escape BASE_DIR and read arbitrary
  files accessible to the process.

