description: |
  A Flask application with route/service/utils layering. The /api/files/download
  endpoint reads a filename from request.args in the route layer, passes it
  through FileService.get_file_content() in the service layer, and ultimately
  calls read_file() in the utils layer which uses os.path.join + open() without
  any normalization or prefix check. The taint flows across three files before
  reaching the sink, requiring cross-file inter-procedural analysis to trace.

