id: "SSRF-PY-FILE-001"
title: "SSRF in Flask URL-fetch endpoint"
description: |
  A Flask route accepts a full URL from the query string and passes it
  directly to requests.get() with no scheme, host, or IP-range validation.
  An attacker can supply internal addresses (e.g. http://169.254.169.254/)
  to probe the internal network or cloud metadata services.

