id: "PT-JA-REPO-001"
title: "Path traversal via three-layer controllerâ†’serviceâ†’util chain (Java)"
description: |
  A Spring Boot application with controller/service/util layering. The
  /api/files/download endpoint reads a filename from @RequestParam in the
  controller layer, passes it through FileService.getFileContent() in the
  service layer, and ultimately calls FileUtil.readFile() in the util layer
  which uses Paths.get() + Files.readAllBytes() without normalization or
  prefix check. The taint flows across three files before reaching the sink,
  requiring cross-file inter-procedural analysis to trace.

