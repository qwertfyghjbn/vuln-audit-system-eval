id: "SSRF-PY-REPO-002"
title: "SSRF guard in service layer, utils layer is unguarded (near-miss)"
description: |
  A Flask application with the same route/service/utils structure as
  SSRF-PY-REPO-001. The route layer is identical. ProxyService._is_safe_url()
  enforces scheme allowlist, domain allowlist, and IP-range blocking before
  delegating to get_url(). utils/http_utils.py:get_url() calls requests.get()
  with no URL check and allow_redirects=False — it looks vulnerable in
  isolation. A system that analyzes http_utils.py alone, or loses track of
  taint at the service→utils boundary, will produce a false positive.

