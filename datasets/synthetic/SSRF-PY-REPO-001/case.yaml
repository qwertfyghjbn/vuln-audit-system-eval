id: "SSRF-PY-REPO-001"
title: "SSRF via three-layer routeâ†’serviceâ†’utils chain (Python)"
description: |
  A Flask application with route/service/utils layering. The
  /api/proxy/fetch endpoint reads a URL from request.args in the route layer,
  passes it through ProxyService.fetch_remote() in the service layer, and
  ultimately calls get_url() in the utils layer which passes the URL directly
  to requests.get() without any scheme, host, or IP-range validation. The
  taint flows across three files before reaching the sink.

