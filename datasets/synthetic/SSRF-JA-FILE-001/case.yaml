id: "SSRF-JA-FILE-001"
title: "SSRF in Spring Boot URL-fetch endpoint"
description: |
  A Spring Boot REST controller accepts a full URL from @RequestParam and
  passes it directly to RestTemplate.getForObject() with no scheme, host,
  or IP-range validation. An attacker can supply internal addresses such as
  http://169.254.169.254/ to probe the internal network or cloud metadata
  services.

