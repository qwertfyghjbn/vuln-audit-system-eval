id: "SSTI-PY-FILE-001"
title: "SSTI via string concatenation into Jinja2 from_string"
description: |
  A Flask route concatenates a user-supplied name directly into a Jinja2
  template string and calls Environment.from_string() on the result.
  An attacker can inject Jinja2 expressions (e.g. {{7*7}}) that are
  evaluated by the engine, enabling arbitrary object traversal and
  potential remote code execution.

