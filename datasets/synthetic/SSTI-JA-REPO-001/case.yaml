description: |
  A Spring Boot application with controller/service/util layering. The
  /api/reports/preview endpoint reads a title from @RequestParam in the
  controller layer, passes it through ReportService.renderPreview() in the
  service layer, and ultimately calls TemplateUtil.renderReportTemplate() in
  the util layer which concatenates the title directly into a Freemarker
  template source string before constructing a Template object. The taint
  flows across three files before reaching the sink, requiring cross-file
  inter-procedural analysis.

