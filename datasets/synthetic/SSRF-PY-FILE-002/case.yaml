id: "SSRF-PY-FILE-002"
title: "SSRF guard via extracted URL validator (near-miss)"
description: |
  A Flask route that has the same surface pattern as SSRF-PY-FILE-001:
  user input flows directly into requests.get(). However, a dedicated
  helper _is_safe_url() enforces scheme allowlist, domain allowlist, and
  IP-range blocking (private/loopback/link-local). allow_redirects=False
  prevents redirect-based bypass. A system without cross-function tracing
  may incorrectly flag requests.get() as a vulnerable sink.

