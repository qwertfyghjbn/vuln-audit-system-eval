id: "SSRF-JA-REPO-002"
title: "SSRF guard in service layer, util layer is unguarded (near-miss)"
description: |
  A Spring Boot application with the same controller/service/util structure
  as SSRF-JA-REPO-001. The controller layer is identical. ProxyService
  contains a private isSafeUrl() method that applies scheme allowlist, domain
  allowlist, and IP-range blocking before delegating to HttpUtil.getUrl().
  HttpUtil.getUrl() calls REST_TEMPLATE.getForObject() with no URL check —
  it looks vulnerable in isolation. The RestTemplate is configured with
  setInstanceFollowRedirects(false) as defense-in-depth. A system that
  analyzes HttpUtil in isolation, or loses track of taint at the service→util
  boundary, will produce a false positive.

